server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/auth
    username: admin
    password: abcde12#

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: "auth-service-jwt-secret-key-must-be-at-least-32-chars"
    access-token-expiry: 1800000    # 30분
    refresh-token-expiry: 604800000  # 7일
