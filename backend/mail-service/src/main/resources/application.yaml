server:
  port: 8082

spring:
  application:
    name: mail-service
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/mail
    username: admin
    password: abcde12#

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger

app:
  kafka:
    topic: mail-events
  mail:
    rate-limit:
      max-requests: 5
      window-seconds: 60
  outbox:
    polling-interval-ms: 5000
